<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes Tool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #f5f5f5;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar-title { font-size: 14px; font-weight: 600; color: #333; }

    .btn-clear {
      font-size: 12px; color: #888; background: none;
      border: 1px solid #ddd; border-radius: 4px;
      padding: 4px 10px; cursor: pointer; display: none;
    }
    .btn-clear:hover { background: #f0f0f0; }

    .messages-area {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
    }

    .empty {
      margin: auto; text-align: center;
      color: #aaa; font-size: 13px; line-height: 2;
    }

    .msg { max-width: 780px; width: 100%; display: flex; flex-direction: column; }
    .msg--user { align-self: flex-end; align-items: flex-end; }
    .msg--assistant { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 4px; color: #999;
    }

    .msg-bubble {
      padding: 10px 14px; border-radius: 6px;
      line-height: 1.6; font-size: 14px;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg--user .msg-bubble {
      background: #1a73e8; color: #fff;
      border-bottom-right-radius: 2px;
    }
    .msg--assistant .msg-bubble {
      background: #fff; border: 1px solid #e0e0e0;
      color: #1a1a1a; border-bottom-left-radius: 2px;
    }

    .typing {
      align-self: flex-start; padding: 10px 14px;
      background: #fff; border: 1px solid #e0e0e0;
      border-radius: 6px; color: #aaa;
      font-size: 13px; font-style: italic;
    }

    .error-bar {
      background: #fff3f3; border: 1px solid #f5c2c2;
      color: #c0392b; font-size: 13px;
      padding: 8px 16px; flex-shrink: 0; display: none;
    }

    .input-area {
      background: #fff; border-top: 1px solid #ddd;
      padding: 12px 20px; display: flex;
      gap: 10px; align-items: flex-end; flex-shrink: 0;
    }

    textarea {
      flex: 1; resize: none; border: 1px solid #ccc;
      border-radius: 6px; padding: 9px 12px;
      font-size: 14px; font-family: inherit;
      line-height: 1.5; min-height: 40px; max-height: 140px;
      outline: none; overflow-y: auto;
      color: #1a1a1a; background: #fafafa;
    }
    textarea:focus { border-color: #1a73e8; background: #fff; }

    .btn-send {
      background: #1a73e8; color: #fff; border: none;
      border-radius: 6px; padding: 9px 18px;
      font-size: 14px; font-weight: 500;
      cursor: pointer; height: 40px;
    }
    .btn-send:hover { background: #1558b0; }
    .btn-send:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="topbar">
    <span class="topbar-title">📝 Notes Tool</span>
    <button class="btn-clear" id="clearBtn" onclick="clearChat()">Clear</button>
  </div>

  <div class="messages-area" id="messages">
    <div class="empty" id="emptyState">
      Type a note or question below<br>
      <span style="font-size:12px">Enter to send · Shift+Enter for new line</span>
    </div>
  </div>

  <div class="error-bar" id="errorBar"></div>

  <div class="input-area">
    <textarea id="input" placeholder="Type here..." rows="1"
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="btn-send" id="sendBtn" onclick="send()" disabled>Send</button>
  </div>

  <script>
    const SYSTEM = "You are a helpful assistant. Be clear and concise.";
    let messages = [];
    let loading = false;

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const errorBar = document.getElementById("errorBar");
    const emptyState = document.getElementById("emptyState");
    const clearBtn = document.getElementById("clearBtn");

    inputEl.addEventListener("input", () => {
      sendBtn.disabled = !inputEl.value.trim() || loading;
    });

    function autoResize(el) {
      el.style.height = "40px";
      el.style.height = Math.min(el.scrollHeight, 140) + "px";
    }

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) send();
      }
    }

    function showError(msg) {
      errorBar.textContent = "⚠ " + msg;
      errorBar.style.display = "block";
    }

    function hideError() {
      errorBar.style.display = "none";
    }

    function addMessage(role, content) {
      emptyState.style.display = "none";
      clearBtn.style.display = "block";

      const div = document.createElement("div");
      div.className = `msg msg--${role}`;
      div.innerHTML = `
        <div class="msg-label">${role === "user" ? "You" : "Assistant"}</div>
        <div class="msg-bubble">${escapeHtml(content)}</div>
      `;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function clearChat() {
      messages = [];
      messagesEl.innerHTML = "";
      messagesEl.appendChild(emptyState);
      emptyState.style.display = "block";
      clearBtn.style.display = "none";
      hideError();
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text || loading) return;

      loading = true;
      sendBtn.disabled = true;
      inputEl.value = "";
      inputEl.style.height = "40px";
      hideError();

      messages.push({ role: "user", content: text });
      addMessage("user", text);

      // Show typing indicator
      const typingEl = document.createElement("div");
      typingEl.className = "typing";
      typingEl.textContent = "Thinking...";
      messagesEl.appendChild(typingEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages: [
              { role: "system", content: SYSTEM },
              ...messages
            ]
          })
        });

        const data = await res.json();
        typingEl.remove();

        if (!res.ok || data.error) {
          showError(data.error || "Something went wrong.");
          messages.pop(); // remove the user message so they can retry
        } else {
          messages.push({ role: "assistant", content: data.reply });
          addMessage("assistant", data.reply);
        }

      } catch (e) {
        typingEl.remove();
        showError("Connection error: " + e.message);
        messages.pop();
      } finally {
        loading = false;
        sendBtn.disabled = !inputEl.value.trim();
      }
    }
  </script>
</body>
</html>
