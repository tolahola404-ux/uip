<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Notes Tool</title>
  <script src="https://xenova.github.io/unarchiver.js/dist/unarchiver.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;background:#f5f5f5;color:#1a1a1a;height:100vh;display:flex;flex-direction:column}
    .topbar{background:#fff;border-bottom:1px solid #ddd;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .topbar-title{font-size:14px;font-weight:600;color:#333}
    .btn-clear{font-size:12px;color:#888;background:none;border:1px solid #ddd;border-radius:4px;padding:4px 10px;cursor:pointer;display:none}
    .btn-clear:hover{background:#f0f0f0}
    .messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
    .empty{margin:auto;text-align:center;color:#aaa;font-size:13px;line-height:2.4}
    .msg{max-width:820px;width:100%;display:flex;flex-direction:column}
    .msg--user{align-self:flex-end;align-items:flex-end}
    .msg--assistant{align-self:flex-start;align-items:flex-start}
    .msg-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;color:#999}
    .msg-bubble{padding:10px 14px;border-radius:6px;line-height:1.6;font-size:14px;white-space:pre-wrap;word-break:break-word;max-width:100%}
    .msg--user .msg-bubble{background:#1a73e8;color:#fff;border-bottom-right-radius:2px}
    .msg--assistant .msg-bubble{background:#fff;border:1px solid #e0e0e0;color:#1a1a1a;border-bottom-left-radius:2px}
    .file-badge{font-size:11px;border-radius:4px;padding:3px 8px;margin-bottom:5px;display:inline-flex;align-items:center;gap:4px;background:#e8f0fe;color:#1a73e8;border:1px solid #c5d8fd}
    .img-preview-msg{max-width:260px;max-height:180px;border-radius:6px;margin-bottom:6px;border:1px solid #e0e0e0;object-fit:contain}
    .typing{align-self:flex-start;padding:10px 14px;background:#fff;border:1px solid #e0e0e0;border-radius:6px;color:#aaa;font-size:13px;font-style:italic}
    .error-bar{background:#fff3f3;border:1px solid #f5c2c2;color:#c0392b;font-size:13px;padding:8px 16px;flex-shrink:0;display:none}
    .status-bar{background:#fff8e1;border-top:1px solid #ffe082;color:#f57f17;font-size:12px;padding:6px 20px;flex-shrink:0;display:none}
    .fp-bar{padding:0 20px 8px;background:#fff;display:none}
    .fp-bar.on{display:block}
    .fp{background:#f8f9fa;border:1px solid #ddd;border-radius:6px;padding:6px 12px;font-size:12px;color:#555;display:flex;align-items:center;gap:8px}
    .fp-thumb{max-width:36px;max-height:36px;border-radius:3px;object-fit:cover;display:none}
    .btn-rm{background:none;border:none;cursor:pointer;color:#aaa;font-size:20px;line-height:1;margin-left:auto}
    .btn-rm:hover{color:#c0392b}
    .input-area{background:#fff;border-top:1px solid #ddd;padding:12px 20px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
    #fileInput{display:none}
    .btn-attach{background:#f0f0f0;color:#555;border:1px solid #ddd;border-radius:6px;width:40px;height:40px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .btn-attach:hover{background:#e0e0e0}
    .btn-attach:disabled{opacity:.5;cursor:not-allowed}
    textarea{flex:1;resize:none;border:1px solid #ccc;border-radius:6px;padding:9px 12px;font-size:14px;font-family:inherit;line-height:1.5;min-height:40px;max-height:140px;outline:none;overflow-y:auto;color:#1a1a1a;background:#fafafa}
    textarea:focus{border-color:#1a73e8;background:#fff}
    .btn-send{background:#1a73e8;color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:14px;font-weight:500;cursor:pointer;height:40px;white-space:nowrap;flex-shrink:0}
    .btn-send:hover{background:#1558b0}
    .btn-send:disabled{background:#ccc;cursor:not-allowed}
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-title">Notes Tool</span>
    <button class="btn-clear" id="clearBtn" onclick="clearChat()">Clear</button>
  </div>

  <div class="messages-area" id="messages">
    <div class="empty" id="emptyState">
      Type a question or attach any file<br>
      <span style="font-size:12px">Enter to send · Shift+Enter for new line</span><br>
      <span style="font-size:11px;color:#ccc">ZIP · RAR · PDF · Word · Images · Code · Any file</span>
    </div>
  </div>

  <div class="error-bar" id="errorBar"></div>
  <div class="status-bar" id="statusBar"></div>

  <div class="fp-bar" id="fpBar">
    <div class="fp">
      <img id="fpThumb" class="fp-thumb"/>
      <span id="fpIcon">📎</span>
      <span id="fpName"></span>
      <span id="fpMeta" style="color:#aaa;font-size:11px"></span>
      <button class="btn-rm" onclick="removeFile()">×</button>
    </div>
  </div>

  <input type="file" id="fileInput" accept="*/*" onchange="handleFile(event)"/>

  <div class="input-area">
    <button class="btn-attach" id="attachBtn" onclick="document.getElementById('fileInput').click()" title="Attach any file">📎</button>
    <textarea id="inp" placeholder="Type here..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="btn-send" id="sendBtn" onclick="send()" disabled>Send</button>
  </div>

<script>
if(window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const SYSTEM=`You are a helpful assistant specialising in Java, Spring Boot, and software development.
When given a project structure with multiple files, understand how they relate to each other before answering.
Be clear, concise and accurate.`;

let msgs=[],loading=false,processing=false;
let att=null; // { name, content, isImage, dataUrl, meta }

const msgsEl   =document.getElementById("messages");
const inp      =document.getElementById("inp");
const sendBtn  =document.getElementById("sendBtn");
const errorBar =document.getElementById("errorBar");
const statusBar=document.getElementById("statusBar");
const emptyEl  =document.getElementById("emptyState");
const clearBtn =document.getElementById("clearBtn");
const fpBar    =document.getElementById("fpBar");
const fpName   =document.getElementById("fpName");
const fpIcon   =document.getElementById("fpIcon");
const fpMeta   =document.getElementById("fpMeta");
const fpThumb  =document.getElementById("fpThumb");
const attachBtn=document.getElementById("attachBtn");

inp.addEventListener("input",updateBtn);
function updateBtn(){sendBtn.disabled=(!inp.value.trim()&&!att)||loading||processing;attachBtn.disabled=processing||loading;}
function autoResize(el){el.style.height="40px";el.style.height=Math.min(el.scrollHeight,140)+"px";}
function handleKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();if(!sendBtn.disabled)send();}}
function showErr(m){errorBar.textContent="⚠ "+m;errorBar.style.display="block";}
function hideErr(){errorBar.style.display="none";}
function showStatus(m){statusBar.textContent=m;statusBar.style.display="block";}
function hideStatus(){statusBar.style.display="none";}

// ── FILE TYPE HELPERS ────────────────────────────────────────────────────────
function getExt(name){return name.split('.').pop().toLowerCase();}
function isZip(name){return['zip','rar','7z','tar','gz','bz2','xz','cab','iso','lzma'].includes(getExt(name));}
function isImage(name,mime){return['jpg','jpeg','png','gif','webp','bmp','svg'].includes(getExt(name))||mime.startsWith('image/');}
function isPDF(name){return getExt(name)==='pdf';}
function isWord(name){return['doc','docx'].includes(getExt(name));}

function getIcon(name){
  const e=getExt(name);
  if(['zip','rar','7z','tar','gz'].includes(e)) return'🗜️';
  if(e==='pdf') return'📕';
  if(['doc','docx'].includes(e)) return'📘';
  if(['jpg','jpeg','png','gif','webp'].includes(e)) return'🖼️';
  if(['java','py','js','ts','cpp','c','cs'].includes(e)) return'☕';
  if(['json','xml','yml','yaml'].includes(e)) return'⚙️';
  return'📄';
}

function formatSize(b){
  if(b<1024) return b+' B';
  if(b<1024*1024) return (b/1024).toFixed(1)+' KB';
  return (b/(1024*1024)).toFixed(1)+' MB';
}

// ── READERS ──────────────────────────────────────────────────────────────────
function readText(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=()=>rej(new Error("fail"));r.readAsText(f);});}
function readURL(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=()=>rej(new Error("fail"));r.readAsDataURL(f);});}
function readBuf(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=()=>rej(new Error("fail"));r.readAsArrayBuffer(f);});}

// ── SKIP THESE FILES IN ZIP ───────────────────────────────────────────────────
const SKIP_PATTERNS=[
  /^__MACOSX/,/\.DS_Store$/,/Thumbs\.db$/,
  /\.class$/,/\.jar$/,/\.war$/,/\.ear$/,
  /\/target\//,/\/\.git\//,/\/\.idea\//,/\/\.vscode\//,
  /\/node_modules\//,/\/bin\//,/\/out\//,/\/build\//,
];
function shouldSkip(path){return SKIP_PATTERNS.some(p=>p.test(path));}

// ── TEXT EXTENSIONS ───────────────────────────────────────────────────────────
const TEXT_EXTS=['java','js','ts','py','c','cpp','cs','go','rb','php','swift','kt','rs',
  'sh','bash','sql','html','css','xml','json','yaml','yml','md','txt','csv',
  'properties','env','toml','ini','cfg','gradle','xml','pom','log','jsp','ftl'];
function isTextFile(name){return TEXT_EXTS.includes(getExt(name));}

// ── PROCESS ANY ARCHIVE (zip, rar, 7z, tar, gz etc.) ─────────────────────────
async function processZip(file){
  showStatus("📦 Extracting "+file.name+"...");

  const archive = await Unarchiver.open(file);
  const allEntries = archive.entries.filter(e => e.is_file && !shouldSkip(e.name));

  // Sort — Java files first
  allEntries.sort((a,b)=>{
    const aJ=a.name.endsWith('.java')?0:1;
    const bJ=b.name.endsWith('.java')?0:1;
    return aJ-bJ||a.name.localeCompare(b.name);
  });

  const treePaths = allEntries.map(e => "  "+e.name);
  let content = `[Archive: ${file.name}]\n`;
  content += `Total files: ${allEntries.length}\n\n`;
  content += `Project Structure:\n${treePaths.join('\n')}\n\n`;
  content += "=".repeat(60)+"\n\n";

  let processed = 0;
  for(const entry of allEntries){
    if(isTextFile(entry.name)){
      showStatus(`📦 Reading ${++processed}/${allEntries.length}: ${entry.name.split('/').pop()}...`);
      try{
        const entryFile = await entry.read();
        const text = await entryFile.text();
        content += `=== ${entry.name} ===\n${text}\n\n`;
      }catch(e){
        content += `=== ${entry.name} ===\n[Could not read: ${e.message}]\n\n`;
      }
    }else{
      content += `=== ${entry.name} ===\n[Binary file — skipped]\n\n`;
    }
  }

  return{content, meta:`${allEntries.length} files extracted`};
}

// ── PROCESS PDF ───────────────────────────────────────────────────────────────
async function processPDF(file){
  showStatus("📕 Reading PDF...");
  const buf=await readBuf(file);
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let text=`[PDF: ${file.name} — ${pdf.numPages} page(s)]\n\n`;
  for(let i=1;i<=pdf.numPages;i++){
    const pg=await pdf.getPage(i);
    const c=await pg.getTextContent();
    text+=`--- Page ${i} ---\n${c.items.map(x=>x.str).join(' ')}\n\n`;
  }
  return{content:text,meta:`${pdf.numPages} pages`};
}

// ── PROCESS WORD ─────────────────────────────────────────────────────────────
async function processWord(file){
  showStatus("📘 Reading Word doc...");
  const buf=await readBuf(file);
  const r=await mammoth.extractRawText({arrayBuffer:buf});
  return{content:`[Word: ${file.name}]\n\n${r.value}`,meta:'Word document'};
}

// ── MAIN FILE HANDLER ─────────────────────────────────────────────────────────
async function handleFile(e){
  const file=e.target.files[0];if(!file)return;
  e.target.value="";
  processing=true;updateBtn();hideErr();

  try{
    if(isImage(file.name,file.type)){
      showStatus("🖼️ Loading image...");
      const dataUrl=await readURL(file);
      att={name:file.name,content:dataUrl.split(',')[1],isImage:true,
           dataUrl,mediaType:file.type||'image/jpeg',meta:formatSize(file.size)};
      showFP(file.name,formatSize(file.size),dataUrl);

    }else if(isZip(file.name)){
      const{content,meta}=await processZip(file);
      att={name:file.name,content,isImage:false,meta};
      showFP(file.name,meta,null);

    }else if(isPDF(file.name)){
      const{content,meta}=await processPDF(file);
      att={name:file.name,content,isImage:false,meta};
      showFP(file.name,meta,null);

    }else if(isWord(file.name)){
      const{content,meta}=await processWord(file);
      att={name:file.name,content,isImage:false,meta};
      showFP(file.name,meta,null);

    }else{
      // Plain text / code file
      showStatus("📄 Reading file...");
      const text=await readText(file);
      att={name:file.name,content:`[File: ${file.name}]\n\`\`\`\n${text}\n\`\`\``,
           isImage:false,meta:formatSize(file.size)};
      showFP(file.name,formatSize(file.size),null);
    }

  }catch(err){
    showErr("Could not read file: "+err.message);
  }finally{
    hideStatus();processing=false;updateBtn();
  }
}

function showFP(name,meta,dataUrl){
  fpIcon.textContent=getIcon(name);
  fpName.textContent=name;
  fpMeta.textContent=meta;
  if(dataUrl){fpThumb.src=dataUrl;fpThumb.style.display="block";}
  else{fpThumb.style.display="none";}
  fpBar.classList.add("on");
}
function removeFile(){att=null;fpBar.classList.remove("on");fpThumb.style.display="none";updateBtn();}

function escH(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function addMsg(role,text,fileInfo,imgDataUrl){
  emptyEl.style.display="none";clearBtn.style.display="block";
  const div=document.createElement("div");div.className=`msg msg--${role}`;
  let html=`<div class="msg-label">${role==="user"?"You":"Claude"}</div>`;
  if(fileInfo){
    if(imgDataUrl) html+=`<img src="${imgDataUrl}" class="img-preview-msg"/>`;
    html+=`<div class="file-badge">${getIcon(fileInfo.name)} ${escH(fileInfo.name)} ${fileInfo.meta?'· '+escH(fileInfo.meta):''}</div>`;
  }
  html+=`<div class="msg-bubble">${escH(text)}</div>`;
  div.innerHTML=html;msgsEl.appendChild(div);msgsEl.scrollTop=msgsEl.scrollHeight;
}

function clearChat(){msgs=[];msgsEl.innerHTML="";msgsEl.appendChild(emptyEl);emptyEl.style.display="block";clearBtn.style.display="none";hideErr();removeFile();}

async function send(){
  const text=inp.value.trim();
  if((!text&&!att)||loading)return;
  loading=true;sendBtn.disabled=true;inp.value="";inp.style.height="40px";hideErr();

  const displayText=text||(att?`Please review: ${att.name}`:"");
  const fileInfo=att?{name:att.name,meta:att.meta}:null;
  const imgDataUrl=att?.isImage?att.dataUrl:null;

  // Build API content
  let apiContent;
  if(att&&att.isImage){
    apiContent=[
      {type:"image",source:{type:"base64",media_type:att.mediaType,data:att.content}},
      {type:"text",text:text||"Please describe and analyse this image."}
    ];
  }else if(att){
    const userText=text||"Please review this file and help me.";
    apiContent=att.content+"\n\n"+userText;
  }else{
    apiContent=text;
  }

  removeFile();
  msgs.push({role:"user",content:apiContent});
  addMsg("user",displayText,fileInfo,imgDataUrl);

  const t=document.createElement("div");t.className="typing";t.textContent="Claude is thinking...";
  msgsEl.appendChild(t);msgsEl.scrollTop=msgsEl.scrollHeight;

  try{
    const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages:[{role:"system",content:SYSTEM},...msgs]})});
    const data=await res.json();t.remove();
    if(!res.ok||data.error){showErr(data.error||"Something went wrong.");msgs.pop();}
    else{msgs.push({role:"assistant",content:data.reply});addMsg("assistant",data.reply);}
  }catch(e){t.remove();showErr("Connection error: "+e.message);msgs.pop();}
  finally{loading=false;updateBtn();}
}
</script>
</body>
</html>
